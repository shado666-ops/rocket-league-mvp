version: '3.8'

services:
  app:
    build: .
    container_name: rl_mvp_app
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./uploaded_replays:/app/uploaded_replays
    environment:
      - ENV=production
      - RRROCKET_PATH=/app/parsers/rrrocket

  # Optionnel : Nginx pour la gestion du domaine et SSL
  # Vous pourrez décommenter cette partie une fois le domaine lié à l'IP du VPS
  # gateway:
  #   image: nginx:latest
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf
  #     - ./certs:/etc/nginx/certs
